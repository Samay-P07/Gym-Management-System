{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="author" content="Patel Samay">
    <title>FITCORE | User Profile - Gym Management</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23f43f5e'/><text x='50' y='68' fill='white' font-family='sans-serif' font-size='50' font-weight='800' text-anchor='middle'>FC</text></svg>">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'assets/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/custom.css' %}">
    <style>
        .field-icon {
            float: right;
            margin-top: -46px;
            margin-right: 15px;
            position: relative;
            z-index: 2;
            color: #94a3b8;
            cursor: pointer;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">
        <a class="navbar-brand" href="/">FIT<span style="color:#ffffff;">CORE</span></a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
            <span class="fa fa-bars" style="color: white;"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/booking_history/" style="color:#f43f5e!important;">Booking History</a></li>
            </ul>
            <ul class="navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="/user_profile/" style="color:#ffffff!important;"><i class="fa fa-user"></i> Profile</a></li>
                <li class="nav-item"><a class="nav-link" href="/user_change_password/"><i class="fa fa-unlock-alt"></i> Password</a></li>
                <li class="nav-item"><a class="nav-link" href="/user_logout/"><i class="fa fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="inner-page-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <form class="custom-form" method="post" action="" enctype="multipart/form-data">
                    {% csrf_token %}
                    <h3 class="mb-4 text-center text-white" style="font-weight: 800; text-transform:uppercase;">My Profile</h3>
                    <div class="row">
                        <div class="col-md-6">
                            <label>First Name</label>
                            <input type="text" name="firstname" class="custom-input" required value="{{data.user.first_name}}">
                        </div>
                        <div class="col-md-6">
                            <label>Last Name</label>
                            <input type="text" name="secondname" class="custom-input" required value="{{data.user.last_name}}">
                        </div>
                        <div class="col-md-6">
                            <label>Email</label>
                            <input type="password" name="email" id="email" class="custom-input mb-0" value="{{data.user.username}}" readonly>
                            <span class="fa fa-eye field-icon toggle-password-2" id="email-eye" onclick="togglePassword2()"></span>
                        </div>
                        <div class="col-md-6 mt-4 mt-md-0">
                            <label>Mobile Number</label>
                            <input type="password" name="mobile" id="mobile" class="custom-input mb-0" value="{{data.mobile}}" readonly>
                            <span class="fa fa-eye field-icon toggle-password" id="mobile-eye" onclick="togglePassword()"></span>
                        </div>
                        <div class="col-12 mt-4">
                            <label>Address</label>
                            <input type="text" name="address" class="custom-input" value="{{data.address}}" required>
                        </div>
                        <div class="col-12 text-center mt-5">
                            <button type="submit" class="btn-primary-custom px-5 border-0">Update Profile</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<footer>
    <div class="container">
        <p>Copyright &copy; <script>document.write(new Date().getFullYear());</script> Gym Management System by Patel Samay | patelsamay071@gmail.com</p>
                    <div style="margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 20px;">
                        <a href="https://github.com/Samay-P07" target="_blank" title="GitHub" style="color:#cbd5e1; text-decoration:none;"><i class="fab fa-github fa-2x" style="transition:0.3s;" onmouseover="this.style.color='#f43f5e'" onmouseout="this.style.color='#cbd5e1'"></i></a>
                        <a href="https://linkedin.com/in/samaypatel7" target="_blank" title="LinkedIn" style="color:#cbd5e1; text-decoration:none;"><i class="fab fa-linkedin fa-2x" style="transition:0.3s;" onmouseover="this.style.color='#f43f5e'" onmouseout="this.style.color='#cbd5e1'"></i></a>
                    </div>
    </div>
</footer>

<script src="{% static 'assets/js/jquery-2.1.0.min.js' %}"></script>
<script src="{% static 'assets/js/bootstrap.min.js' %}"></script>
<script>
function togglePassword() {
  var mobileInput = document.getElementById("mobile");
  var eyeIcon = document.getElementById("mobile-eye");
  if (mobileInput.type == "password") {
    eyeIcon.classList.remove("fa-eye");
    eyeIcon.classList.add("fa-eye-slash");
    mobileInput.type = "text";
  } else {
    eyeIcon.classList.remove("fa-eye-slash");
    eyeIcon.classList.add("fa-eye");
    mobileInput.type = "password";
  }
}
function togglePassword2() {
  var emailInput = document.getElementById("email")
  var eyeIcon = document.getElementById("email-eye");
  if (emailInput.type == "password") {
    eyeIcon.classList.remove("fa-eye");
    eyeIcon.classList.add("fa-eye-slash");
    emailInput.type = "text";
  } else {
    eyeIcon.classList.remove("fa-eye-slash");
    eyeIcon.classList.add("fa-eye");
    emailInput.type = "password";
  }
}
</script>
{% for i in messages %}
<script>alert('{{i}}');</script>
{% endfor %}
</body>
</html>
